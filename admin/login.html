<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Admin | wafaabbas.com</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Login Admin</h1>
      <nav class="site-nav">
        <a href="../index.html">Kembali ke situs</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Masuk ke dashboard artikel</h2>
      <p class="muted">
        Ini login dummy hanya untuk prototype. Nanti akan diganti Supabase Auth yang beneran.
      </p>
    </section>

    <section style="margin-top: 24px; max-width: 380px;">
      <form id="login-form" style="display:grid;gap:12px;">
        <label>
          Password admin
          <input type="password" id="admin-password" required />
        </label>

        <button type="submit">Masuk</button>
        <p class="muted" id="login-message"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>Admin prototype · <span id="year"></span></small>
    </div>
  </footer>

  <script src="../assets/js/admin-auth.js"></script>
</body>
</html>
