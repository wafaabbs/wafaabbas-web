<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #111827;
        color: #f3f4f6;
      }

      .card {
        width: min(92vw, 420px);
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 24px;
        color: #9ca3af;
        line-height: 1.6;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font-size: 1rem;
        cursor: pointer;
        background: #2563eb;
        color: white;
      }

      button:hover {
        background: #1d4ed8;
      }

      .status {
        margin-top: 16px;
        font-size: 0.95rem;
        color: #fbbf24;
      }

      .status.error {
        color: #f87171;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Admin Access</h1>
      <p>Use your GitHub account to sign in and manage posts.</p>
      <button id="github-login" type="button">Sign in with GitHub</button>
      <div id="status" class="status" role="status"></div>
    </main>

    <script>
      window.SUPABASE_URL = window.SUPABASE_URL || 'https://YOUR_PROJECT_REF.supabase.co';
      window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'YOUR_ANON_KEY';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../services/supabase.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const loginButton = document.getElementById('github-login');

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle('error', isError);
      }

      async function handleLogin() {
        loginButton.disabled = true;
        setStatus('Starting GitHub sign-in…');

        try {
          await window.supabaseAuth.signInWithGithub(new URL('./dashboard.html', window.location.href).toString());
        } catch (error) {
          loginButton.disabled = false;
          setStatus(error.message || 'Unable to start sign-in.', true);
        }
      }

      async function initSession() {
        try {
          const config = window.supabaseAuth.getConfigStatus();
          if (!config.configured) {
            setStatus('Replace the placeholder Supabase values with your project credentials before testing sign-in.', true);
            return;
          }

          const { data: { session } } = await window.supabaseAuth.getSession();
          if (session) {
            window.location.href = './dashboard.html';
          }
        } catch (error) {
          setStatus(error.message || 'Unable to check your session.', true);
        }
      }

      loginButton.addEventListener('click', handleLogin);
      initSession();
    </script>
  </body>
</html>
