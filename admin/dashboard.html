<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f3f4f6;
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      .card {
        background: #1f2937;
        padding: 24px;
        border-radius: 16px;
        border: 1px solid #374151;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        background: #ef4444;
        color: white;
      }

      .muted {
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Admin Dashboard</h1>
        <p id="message" class="muted">Checking your sign-in status…</p>
        <div id="user-info"></div>
        <button id="sign-out" type="button" style="margin-top: 16px; display: none;">Sign out</button>
      </section>
    </main>

    <script>
      window.SUPABASE_URL = window.SUPABASE_URL || 'https://YOUR_PROJECT_REF.supabase.co';
      window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'YOUR_ANON_KEY';
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../services/supabase.js"></script>
    <script>
      const messageEl = document.getElementById('message');
      const userInfoEl = document.getElementById('user-info');
      const signOutButton = document.getElementById('sign-out');

      async function loadDashboard() {
        try {
          const config = window.supabaseAuth.getConfigStatus();
          if (!config.configured) {
            messageEl.textContent = 'Add your Supabase project credentials to enable GitHub sign-in.';
            return;
          }

          const { data: { session } } = await window.supabaseAuth.getSession();
          if (!session) {
            messageEl.textContent = 'You are not signed in yet.';
            window.location.href = './login.html';
            return;
          }

          const user = session.user;
          messageEl.textContent = `Signed in as ${user.user_metadata?.full_name || user.email || 'GitHub user'}.`;
          userInfoEl.innerHTML = `
            <p><strong>Name:</strong> ${user.user_metadata?.full_name || 'Unknown'}</p>
            <p><strong>Email:</strong> ${user.email || 'Not provided'}</p>
            <p><strong>Provider:</strong> ${user.app_metadata?.provider || 'GitHub'}</p>
          `;
          signOutButton.style.display = 'inline-block';
        } catch (error) {
          messageEl.textContent = error.message || 'Unable to load the dashboard.';
        }
      }

      signOutButton.addEventListener('click', async () => {
        try {
          await window.supabaseAuth.signOut();
          window.location.href = './login.html';
        } catch (error) {
          messageEl.textContent = error.message || 'Unable to sign out.';
        }
      });

      loadDashboard();
    </script>
  </body>
</html>
