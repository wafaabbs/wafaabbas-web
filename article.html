<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artikel | wafaabbas.com</title>
  <meta name="description" content="Daftar artikel akuntansi, perpajakan, dan keuangan di wafaabbas.com.">
  <link rel="stylesheet" href="assets/css/main.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Artikel</h1>
      <nav class="site-nav">
        <a href="index.html">Beranda</a>
        <a href="article.html">Artikel</a>
        <a href="about.html">Tentang</a>
        <a href="contact.html">Kontak</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Semua artikel</h2>
      <p class="muted">
        Kumpulan tulisan tentang akuntansi, perpajakan, dan keuangan praktis.
        Klik judul untuk membaca detail artikel.
      </p>
    </section>

    <section class="articles" aria-labelledby="articles-heading" style="margin-top:20px;">
      <div class="section-header">
        <h2 id="articles-heading">Daftar artikel</h2>
      </div>

      <div id="article-list" class="article-list">
        <p class="muted" id="article-empty-state">
          Belum ada artikel yang dipublikasikan.
        </p>
      </div>
    </section>

    <section class="article-detail" id="article-detail" hidden>
      <hr style="margin:24px 0;" />
      <article>
        <img id="detail-thumbnail" class="detail-thumbnail" alt="" hidden />
        <h2 id="detail-title"></h2>
        <p class="muted" id="detail-meta" style="margin-bottom:10px;"></p>
        <div id="detail-content"></div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>&copy; <span id="year"></span> Wafa Abbas.</small>
    </div>
  </footer>

  <script src="services/supabase.js"></script>
  <script src="assets/js/articles.js"></script>
</body>
</html>
